dataDir = "ath/data"
staticDir = "ath/static"

[params]
  description = "Sayan's fitness tracking site — workouts, recipes, body stats, daily log"
  athlete = "Sayan Chowdhury"
  startDate = "2025"
  brandPrefix = "ATH"
  brandSuffix = "LOG"
  googleFonts = true
  heroEyebrow = "// training log active"
