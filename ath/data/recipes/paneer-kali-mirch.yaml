title: "Paneer Kali Mirch"
slug: "paneer-kali-mirch"
category: "dinner"
protein_source: "paneer"
prep_time: 5
cook_time: 15
total_time: 20
servings: 1
calories: 300
macros:
  protein: 18
  carbs: 10
  fat: 17
tags: ["paneer", "dinner", "quick", "distinctive"]
meal_prep: false
description: "Tangy, peppery dry paneer with amchur. Completely different from every other paneer dish in the rotation."
ingredients:
  - item: "Paneer (2cm cubes)"
    amount: "100g"
  - item: "Onion (finely sliced)"
    amount: "50g"
  - item: "Tomato (finely chopped)"
    amount: "50g"
  - item: "Green chilli"
    amount: "1"
  - item: "Ginger garlic paste"
    amount: "½ tsp"
  - item: "Black pepper (coarsely ground)"
    amount: "½ tsp"
  - item: "Cumin seeds"
    amount: "½ tsp"
  - item: "Turmeric"
    amount: "¼ tsp"
  - item: "Dry mango powder (amchur)"
    amount: "½ tsp"
  - item: "Fresh coriander"
    amount: "5g"
  - item: "Ghee"
    amount: "1 tsp"
  - item: "Spinach or beans (side)"
    amount: "60g"
steps:
  - "Heat ghee on medium-high. Sear paneer cubes on 2 sides until light golden (~2 min each). Remove"
  - "Same pan: add cumin seeds. Once they splutter add onion and green chilli. Cook 3 min"
  - "Add ginger garlic paste. Stir 1 min. Add tomato. Cook 2 min until broken down"
  - "Add turmeric, black pepper, salt. Stir 30 seconds"
  - "Add paneer back in. Add amchur. Toss on high heat 1 min. Finish with coriander"
  - "Stir-fry side vegetables separately with salt 3 min"
reheat: "High heat pan 2 min. Add tiny splash of water if sticking."
notes: "Amchur is the key ingredient — sharp tanginess without liquid. Find it at any provision store. Lemon as substitute works but is not the same."
