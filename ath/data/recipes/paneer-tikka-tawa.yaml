title: "Paneer Tikka Tawa"
slug: "paneer-tikka-tawa"
category: "dinner"
protein_source: "paneer"
prep_time: 8
cook_time: 10
total_time: 18
servings: 1
calories: 290
macros:
  protein: 18
  carbs: 8
  fat: 16
tags: ["paneer", "dinner", "quick", "no-oven"]
meal_prep: false
description: "Charred curd-marinated paneer on a hot tawa. No oven needed. Fastest dinner in the rotation."
ingredients:
  - item: "Paneer (3cm cubes)"
    amount: "100g"
  - item: "Thick curd"
    amount: "2 tbsp"
  - item: "Turmeric"
    amount: "¼ tsp"
  - item: "Red chilli powder"
    amount: "½ tsp"
  - item: "Coriander powder"
    amount: "½ tsp"
  - item: "Garam masala"
    amount: "¼ tsp"
  - item: "Lemon juice"
    amount: "1 tsp"
  - item: "Capsicum (chunky)"
    amount: "40g"
  - item: "Onion (wedges)"
    amount: "30g"
  - item: "Oil or ghee"
    amount: "1 tsp"
steps:
  - "Mix all spices with curd and lemon juice"
  - "Toss paneer, capsicum and onion in the marinade. Rest 5 min"
  - "Heat pan on HIGH — must be very hot before paneer goes in"
  - "Add oil then everything in one layer. Do not move for 2–3 min — let char marks form"
  - "Flip and cook 2 more min on high"
  - "Squeeze fresh lemon over before eating"
reheat: "Best eaten fresh. If reheating: high heat pan 2 min, no water."
notes: "The key is genuinely high heat. If the pan is not hot enough the paneer steams instead of charring."
