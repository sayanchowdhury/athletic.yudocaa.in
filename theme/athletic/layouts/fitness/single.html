{{ define "main" }}

<div class="page-header">
  <div class="page-header-inner">
    <a href="/fitness/" style="font-family:var(--font-mono);font-size:11px;color:var(--grey-5);text-transform:uppercase;letter-spacing:.1em;display:inline-block;margin-bottom:16px">← Fitness posts</a>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--acid);margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em">{{ .Date.Format "02 January 2006" }}</div>
    <h1>{{ .Title }}</h1>
    {{ with .Params.tags }}
    <div style="display:flex;gap:6px;margin-top:16px;flex-wrap:wrap">
      {{ range . }}<span class="pill pill-ghost">#{{ . }}</span>{{ end }}
    </div>
    {{ end }}
  </div>
</div>

<div class="container" style="padding-bottom:80px">
  <div class="prose">
    {{ .Content }}
  </div>
  <div style="display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--grey-3)">
    {{ with .PrevInSection }}<a href="{{ .Permalink }}" class="btn btn-ghost">← {{ .Title }}</a>{{ end }}
    {{ with .NextInSection }}<a href="{{ .Permalink }}" class="btn btn-ghost">{{ .Title }} →</a>{{ end }}
  </div>
</div>

{{ end }}
