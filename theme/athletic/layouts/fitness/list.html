{{ define "main" }}

<div class="page-header">
  <div class="page-header-inner">
    <div class="hero-eyebrow">// fitness posts</div>
    <h1>Fitness<br><span style="color:var(--acid)">Writing</span></h1>
  </div>
</div>

<div class="container" style="padding-bottom:80px">
  {{ range (.Pages.GroupByDate "2006") }}
  <div style="margin-bottom:48px">
    <div style="font-family:var(--font-display);font-size:72px;font-weight:900;color:var(--grey-3);line-height:1;margin-bottom:24px">{{ .Key }}</div>
    <div class="grid-2">
      {{ range .Pages }}
      <a href="{{ .Permalink }}" class="card" style="text-decoration:none">
        <div class="card-body">
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--acid);margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em">{{ .Date.Format "02 Jan 2006" }}</div>
          <div class="card-title">{{ .Title }}</div>
          <div class="card-desc">{{ .Summary }}</div>
          {{ with .Params.tags }}
          <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
            {{ range . }}<span class="pill pill-ghost">#{{ . }}</span>{{ end }}
          </div>
          {{ end }}
        </div>
      </a>
      {{ end }}
    </div>
  </div>
  {{ end }}
</div>

{{ end }}
