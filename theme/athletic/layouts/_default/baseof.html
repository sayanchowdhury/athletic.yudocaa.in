<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/athletic.css" | relURL }}">
  {{ if .Site.Params.googleFonts }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {{ end }}
  {{ block "head" . }}{{ end }}
  <script>
    (function(){var t=localStorage.getItem('theme');if(t){document.documentElement.setAttribute('data-theme',t)}})();
  </script>
</head>
<body>

<!-- Lock screen -->
<div id="lock-screen" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;max-width:360px;padding:24px">
    <div style="font-family:var(--font-display);font-size:28px;font-weight:900;text-transform:uppercase;color:var(--acid);margin-bottom:8px">ATH<span style="color:var(--white)">&middot;</span>LOG</div>
    <p style="font-size:13px;color:var(--grey-5);margin-bottom:32px">Enter password to continue</p>
    <input id="lock-input" type="password" placeholder="Password" autofocus
      style="width:100%;padding:12px 16px;font-family:var(--font-mono);font-size:14px;background:var(--grey-1);border:1px solid var(--grey-3);border-radius:var(--radius);color:var(--white);outline:none;margin-bottom:12px">
    <div id="lock-error" style="font-family:var(--font-mono);font-size:11px;color:var(--red);margin-bottom:12px;visibility:hidden">Wrong password</div>
    <button id="lock-btn" style="width:100%;padding:12px;font-family:var(--font-display);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:var(--acid);color:var(--black);border:none;border-radius:var(--radius);cursor:pointer">Unlock</button>
  </div>
</div>

<script>
(function(){
  var HASH='90ba5c921c279f94c03a8840942b9ca6c1ba0991321deaea3890ea0a72cd52a7';
  var lock=document.getElementById('lock-screen');
  if(localStorage.getItem('ath-unlocked')===HASH){lock.style.display='none';return}
  lock.style.display='flex';
  document.getElementById('lock-btn').addEventListener('click',tryUnlock);
  document.getElementById('lock-input').addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock()});
  async function tryUnlock(){
    var pw=document.getElementById('lock-input').value;
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
    var hash=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    if(hash===HASH){localStorage.setItem('ath-unlocked',HASH);lock.style.display='none'}
    else{document.getElementById('lock-error').style.visibility='visible';document.getElementById('lock-input').value=''}
  }
})();
</script>

{{ partial "navbar.html" . }}

<main>
  {{ block "main" . }}{{ end }}
</main>

{{ partial "footer.html" . }}

<script src="{{ "js/athletic.js" | relURL }}"></script>
{{ block "scripts" . }}{{ end }}

</body>
</html>
